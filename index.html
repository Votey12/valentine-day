<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Puppy Valentine 💘🐶</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-hearts" id="hearts"></div>

  <main class="card" id="card">
    <div class="top">
      <div class="emoji">🐶💘</div>
      <h1 id="title">Will you be my Valentine, PS?</h1>
      <p class="subtitle" id="subtitle">I want to be your puppy on this day, not your tiger haha</p> 🐾</p>
    </div>

    <div class="puppy">
      <div class="face">
        <div class="ear ear-left"></div>
        <div class="ear ear-right"></div>
        <div class="head">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
          <div class="snout">
            <div class="nose"></div>
            <div class="mouth"></div>
          </div>
        </div>
      </div>
      <div class="paw">🐾</div>
    </div>

    <div class="buttons">
      <button class="btn yes" id="yesBtn">Yes 🦴</button>
      <button class="btn no" id="noBtn">No 😿</button>
    </div>

    <p class="hint" id="hint">Try clicking “No”… if you can 😏</p>
  </main>

  <section class="popup" id="popup" aria-hidden="true">
    <div class="popup-box">
      <h2>WOOF WOOF!!! 🥹🐶💞</h2>
      <p>You said <b>YES</b>! Yayy! Can't wait for the Boston date.</p>
      <p class="small">Screenshot this and send it to me 🐾</p>
      <button class="btn close" id="closeBtn">Close</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
